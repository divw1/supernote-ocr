name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: python -m py_compile native_qwen_ocr.py ocr_gui.py

      - name: Install dependencies
        run: pip install -q -r requirements_native.txt

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          ignore_paths: ".git"
